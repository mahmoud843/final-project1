<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Store Pro | تسوق كتب البرمجة</title>
  <!-- سيبنا url_for للـ CSS بس عشان الستايل ميضربش -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
      .back-to-home {
          text-decoration: none;
          color: rgba(59,130,246,.95);
          font-weight: bold;
          margin-right: 20px;
          display: flex;
          align-items: center;
          gap: 5px;
      }
      .back-to-home:hover {
          text-decoration: underline;
      }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand" style="display: flex; align-items: center;">
        <div class="logo" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M4.8 5.5c0-1 .8-1.8 1.8-1.8h4.9c1.4 0 2.6.6 3.3 1.5.7-.9 1.9-1.5 3.3-1.5h.6c1 0 1.8.8 1.8 1.8v14.9c0 .8-.7 1.3-1.5 1.1-1.5-.4-3-.7-4.2-.7-1.6 0-3 .4-4 .9-.4.2-.9.2-1.3 0-1-.5-2.4-.9-4-.9-1.2 0-2.7.3-4.2.7-.8.2-1.5-.3-1.5-1.1V5.5Z"
                  stroke="rgba(59,130,246,.95)" stroke-width="1.6"/>
          </svg>
        </div>
        <b>Book Store Pro</b>
        <a href="{{ url_for('home_page') }}" class="back-to-home">
           &larr; العودة للرئيسية
        </a>
      </div>
      
      <nav class="midnav">
        <span>الكتب</span>
        <span class="sep">|</span>
        <span>Admin</span>
      </nav>
      <div class="cartBtn">
        <div class="cartIcon" title="سلة التسوق">
          <div class="badge" id="cartCount">0</div>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 7h14l-2 8H8L7 7Zm0 0-1-3H3" stroke="rgba(229,231,235,.95)" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M9.5 20a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4ZM17.5 20a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4Z" fill="rgba(229,231,235,.95)"/>
          </svg>
        </div>
      </div>
    </header>
    
    <div class="grid">
      <main>
        <section class="banner">
          <div class="bannerInner">
            <div class="heroText">
              <h1>تسوق كتب البرمجة</h1>
              <p>Python, CSS, JavaScript, HTML, أفضل الكتب اتعلمها</p>
              <div class="heroActions">
                <button class="btn primary" id="searchNowBtn">ابدأ الآن</button>
              </div>
            </div>
            <div class="heroArt">
              <!-- استخدام المسار المباشر لصورة البانر -->
              <img src="../static/images/banner_hd.png" alt="Hero Banner" class="heroImg">
            </div>
          </div>
        </section>

        <section class="products" id="productsGrid">
          
          <!-- كتاب 1: بايثون -->
          <div class="card" data-category="python" data-name="تعلم Python للمبتدئين" data-price="120" data-id="1">
            <div class="cover">
                <!-- استخدام المسار المباشر -->
                <img src="../static/images/python.png" alt="تعلم Python للمبتدئين" style="width:100%; height:100%; border-radius:16px; object-fit: cover;">
            </div>
            <div class="meta" style="margin-top: 10px;">
              <div class="price" style="font-weight: bold; color: #fbbf24;">120 جنيه</div>
              <button class="addBtn" onclick="addToCart(this)">أضف للسلة</button>
            </div>
          </div>

          <!-- كتاب 2: CSS -->
          <div class="card" data-category="css" data-name="CSS من الصفر للاحتراف" data-price="80" data-id="2">
            <div class="cover">
                <!-- استخدام المسار المباشر -->
                <img src="../static/images/css.png" alt="CSS من الصفر للاحتراف" style="width:100%; height:100%; border-radius:16px; object-fit: cover;">
            </div>
            <div class="meta" style="margin-top: 10px;">
              <div class="price" style="font-weight: bold; color: #fbbf24;">80 جنيه</div>
              <button class="addBtn" onclick="addToCart(this)">أضف للسلة</button>
            </div>
          </div>

          <!-- كتاب 3: JavaScript -->
          <div class="card" data-category="javascript" data-name="JavaScript كامل" data-price="150" data-id="3">
            <div class="cover">
                <!-- استخدام المسار المباشر -->
                <img src="../static/images/js.png" alt="JavaScript كامل" style="width:100%; height:100%; border-radius:16px; object-fit: cover;">
            </div>
            <div class="meta" style="margin-top: 10px;">
              <div class="price" style="font-weight: bold; color: #fbbf24;">150 جنيه</div>
              <button class="addBtn" onclick="addToCart(this)">أضف للسلة</button>
            </div>
          </div>

          <!-- كتاب 4: HTML -->
          <div class="card" data-category="html" data-name="HTML & Web Design" data-price="70" data-id="4">
            <div class="cover">
                <!-- استخدام المسار المباشر -->
                <img src="../static/images/HTML5.png" alt="HTML & Web Design" style="width:100%; height:100%; border-radius:16px; object-fit: cover;">
            </div>
            <div class="meta" style="margin-top: 10px;">
              <div class="price" style="font-weight: bold; color: #fbbf24;">70 جنيه</div>
              <button class="addBtn" onclick="addToCart(this)">أضف للسلة</button>
            </div>
          </div>

        </section>
      </main>
      
      <aside class="cart" id="cartPanel">
        <div class="cartHead">
          <h3>سلة التسوق</h3>
        </div>
        <div class="cartList" id="cartList">
          <!-- عناصر السلة -->
        </div>
        <div class="sum">
          <span>الإجمالي:</span>
          <span id="totalPrice">0</span>
        </div>
        <div class="coupon">
          <div class="couponTop">كود الخصم</div>
          <div class="couponRow">
            <input type="text" id="couponInput" placeholder="أدخل كود الخصم">
            <button id="applyCouponBtn">تطبيق</button>
          </div>
        </div>
      </aside>
    </div>
  </div>
  
  <script>
    let cart = [];
    const cartList = document.getElementById('cartList');
    const cartCount = document.getElementById('cartCount');
    const totalPriceEl = document.getElementById('totalPrice');

    function addToCart(btnElement){
      const card = btnElement.closest('.card');
      const id = parseInt(card.getAttribute('data-id'));
      const name = card.getAttribute('data-name');
      const price = parseInt(card.getAttribute('data-price'));

      const exist = cart.find(c => c.id === id);
      
      if(exist) {
          exist.qty++;
      } else {
          cart.push({id: id, name: name, price: price, qty: 1});
      }
      updateCart();
    }

    function updateCart(){
      cartList.innerHTML='';
      let total = 0;
      
      cart.forEach((c, i) => {
        total += c.price * c.qty;
        const div = document.createElement('div');
        div.className = "cartItem";
        div.style.cssText = "display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: rgba(17,24,39,.55); padding: 8px; border-radius: 10px;";
        
        div.innerHTML = `
          <div class="cartLeft" style="display: flex; gap: 10px; align-items: center;">
            <div class="cartTxt">
              <div class="t" style="font-size: 14px;">${c.name}</div>
              <div class="p" style="color: var(--gold); font-weight: bold; font-size: 12px;">${c.price} جنيه</div>
            </div>
          </div>
          <div class="cartControls" style="display: flex; gap: 8px; align-items: center; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 8px;">
            <button onclick="changeQty(${i},-1)" style="background: transparent; border: none; color: white; cursor: pointer; font-size: 16px;">-</button>
            <div class="qty" style="font-weight: bold;">${c.qty}</div>
            <button onclick="changeQty(${i},1)" style="background: transparent; border: none; color: white; cursor: pointer; font-size: 16px;">+</button>
          </div>
        `;
        cartList.appendChild(div);
      });
      
      cartCount.innerText = cart.reduce((sum, item) => sum + item.qty, 0);
      totalPriceEl.innerText = total + " جنيه";
    }

    function changeQty(i, delta){
      cart[i].qty += delta;
      if(cart[i].qty <= 0) cart.splice(i,1);
      updateCart();
    }
  </script>
</body>
</html>
