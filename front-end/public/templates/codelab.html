<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Lab - معمل البرمجة | PAD</title>
    
    <!-- مكتبات CodeMirror الأساسية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    
    <!-- لغات CodeMirror المطلوبة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --bg-main: #070b17;
            --bg-panel: #0f1933;
            --text-light: #eaf0ff;
            --text-muted: #8fa5de;
            --primary: #1b74e4;
            --primary-glow: rgba(27, 116, 228, 0.4);
            --success: #22c55e;
            --danger: #ef4444;
            --border: rgba(145,175,255,0.1);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-main); margin: 0; padding: 0; 
            color: var(--text-light); display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* الهيدر والتبويبات */
        .header {
            background: rgba(15, 25, 51, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); padding: 0 30px;
            display: flex; align-items: center; justify-content: space-between;
            height: 70px; z-index: 1000;
        }
        
        .header-left { display: flex; align-items: center; gap: 30px; }
        .header-title h1 { margin: 0; font-size: 20px; color: #fff;}
        .header-title p { margin: 0; font-size: 12px; color: var(--text-muted);}

        /* أزرار اختيار اللغة */
        .lang-tabs { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 12px; border: 1px solid var(--border);}
        .lang-btn {
            background: transparent; color: var(--text-muted); border: none; padding: 8px 20px;
            border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold;
            transition: all 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .lang-btn:hover { color: #fff; }
        .lang-btn.active { background: var(--primary); color: #fff; box-shadow: 0 0 15px var(--primary-glow);}
        
        .back-btn {
            background: rgba(255, 255, 255, 0.05); color: var(--text-muted); text-decoration: none;
            padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 14px;
            transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;
            border: 1px solid var(--border);
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; transform: translateX(-3px); }

        /* منطقة العمل */
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* القائمة الجانبية للتحديات */
        .sidebar {
            width: 300px; background: var(--bg-panel); border-left: 1px solid var(--border);
            overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .sidebar h3 { margin: 0 0 10px 0; font-size: 16px; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 10px;}

        .challenge-item {
            background: rgba(255, 255, 255, 0.03); padding: 12px; border: 1px solid transparent;
            border-radius: 10px; cursor: pointer; transition: all 0.3s;
        }
        .challenge-item:hover { background: rgba(255, 255, 255, 0.08); }
        .challenge-item.active { background: rgba(27, 116, 228, 0.15); border-color: var(--primary); }
        .challenge-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #fff;}
        .difficulty { font-size: 10px; padding: 3px 8px; border-radius: 20px; color: #fff; font-weight: bold;}
        .diff-beginner { background: var(--success); }
        .diff-intermediate { background: #eab308; }

        /* المحرر والتفاصيل */
        .codelab-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .challenge-info { background: var(--bg-panel); padding: 20px; border-radius: 16px; border: 1px solid var(--border);}
        .challenge-info h2 { margin: 0 0 10px 0; color: #fff; font-size: 20px;}
        .challenge-info p { color: var(--text-muted); line-height: 1.6; margin: 0 0 15px 0; font-size: 14px;}
        
        .sample-box { background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 10px; border: 1px dashed var(--border); display: flex; gap: 20px;}
        .sample-col { flex: 1; }
        .sample-col strong { color: #fff; font-size: 13px; display: block; margin-bottom: 8px;}
        .sample-box pre { margin: 0; font-family: monospace; font-size: 14px; color: var(--success); direction: ltr; text-align: left; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 6px;}

        /* قسم المحرر */
        .editor-section { background: var(--bg-panel); padding: 20px; border-radius: 16px; border: 1px solid var(--border); display: flex; flex-direction: column; flex: 1;}
        .editor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .editor-header h3 { margin: 0; font-size: 15px; color: #fff; display: flex; align-items: center; gap: 8px;}
        
        .run-button { background: var(--success); color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.3s; display: flex; align-items: center; gap: 8px;}
        .run-button:hover { background: #16a34a; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);}

        .CodeMirror { height: 280px; border-radius: 10px; font-family: monospace; font-size: 15px; text-align: left; direction: ltr; padding: 10px 0; border: 1px solid var(--border);}
        
        /* النتيجة والمعاينة */
        .output-section { margin-top: 15px; display: flex; flex-direction: column; flex: 1;}
        .output-box { background: #000; color: #fff; padding: 15px; border-radius: 10px; min-height: 100px; font-family: monospace; font-size: 14px; direction: ltr; text-align: left; border: 1px solid var(--border); overflow-y: auto;}
        
        /* إطار العرض الخاص بـ HTML/CSS */
        .html-preview-frame { width: 100%; height: 150px; background: #fff; border: 1px solid var(--border); border-radius: 10px; display: none; margin-top: 10px;}

        .correct { color: var(--success); font-weight: bold; margin-bottom: 5px; }
        .wrong { color: var(--danger); font-weight: bold; margin-bottom: 5px; }
        .info-msg { color: #38bdf8; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="header-title">
            <h1>🧪 Code Lab</h1>
            <p>اختر لغتك وابدأ التحدي</p>
        </div>
        <!-- أزرار اختيار اللغة -->
        <div class="lang-tabs">
            <button class="lang-btn active" onclick="switchLanguage('python')" id="tab-python">
                <i class="fa-brands fa-python"></i> Python
            </button>
            <button class="lang-btn" onclick="switchLanguage('web')" id="tab-web">
                <i class="fa-brands fa-html5"></i> HTML/CSS
            </button>
        </div>
    </div>
    
      
    <a href="{{ url_for('home_page') }}" class="back-btn">
        <span>العودة لـ PAD</span>
        <i class="fa-solid fa-arrow-left"></i>
    </a>

</div>

<div class="main-container">
    
    <div class="sidebar" id="sidebar">
        <h3 id="sidebar-title">📋 تحديات Python</h3>
        <div id="challenges-list"></div>
    </div>

    <div class="codelab-content">
        <div class="challenge-info">
            <h2 id="current-title">جاري التحميل...</h2>
            <p id="current-desc"></p>
            <div class="sample-box">
                <div class="sample-col" id="input-col">
                    <strong>📥 المدخلات أو الشروط:</strong> 
                    <pre id="current-input">-</pre>
                </div>
                <div class="sample-col">
                    <strong>📤 المخرجات المتوقعة:</strong> 
                    <pre id="current-output">-</pre>
                </div>
            </div>
        </div>

        <div class="editor-section">
            <div class="editor-header">
                <h3 id="editor-title"><i class="fa-brands fa-python" style="color:#fbbf24;"></i> محرر بايثون</h3>
                <button onclick="checkCode()" class="run-button"><i class="fa-solid fa-play"></i> تشغيل الكود</button>
            </div>
            
            <textarea id="code-editor"></textarea>
            
            <div class="output-section">
                <h3 style="margin: 0 0 5px 0; font-size: 14px; color: var(--text-muted);">📊 النتيجة</h3>
                <div class="output-box" id="output-box">
                    <span style="color: #666;">اضغط على "تشغيل الكود" لرؤية النتيجة هنا...</span>
                </div>
                <!-- فريم الـ HTML/CSS حيظهر بس لو اليوزر اختار Web -->
                <iframe id="html-preview" class="html-preview-frame" sandbox="allow-scripts"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. قاعدة بيانات التحديات مقسمة للغتين
    const allChallenges = {
        python: [
            { id: 1, title: "1. طباعة نص بسيط", description: "استخدم أمر الطباعة في بايثون لطباعة 'Hello, world!'", sample_input: "لا يوجد", sample_output: "Hello, world!", difficulty: "beginner" },
            { id: 2, title: "2. حاصل الجمع", description: "اكتب برنامج يطبع ناتج جمع 5 و 3", sample_input: "5 + 3", sample_output: "8", difficulty: "beginner" },
            { id: 3, title: "3. الشرط البسيط", description: "اكتب كود يطبع 'even' إذا كان الرقم زوجياً", sample_input: "التحقق من رقم", sample_output: "even", difficulty: "intermediate" }
        ],
        web: [
            { id: 101, title: "1. عنوان رئيسي HTML", description: "قم بإنشاء عنوان من النوع الأول H1 واكتب بداخله 'PAD Platform'", sample_input: "استخدم تاج <h1>", sample_output: "<h1>PAD Platform</h1>", difficulty: "beginner" },
            { id: 102, title: "2. تلوين نص بـ CSS", description: "قم بإنشاء فقرة <p> واكتب بداخلها 'Hello' ثم استخدم CSS (بواسطة ستايل داخلي أو تاج style) لتلوينها باللون الأحمر (red)", sample_input: "color: red;", sample_output: "نص لونه أحمر", difficulty: "intermediate" },
            { id: 103, title: "3. زر تفاعلي", description: "قم بإنشاء زر <button> واكتب عليه 'Click Me'", sample_input: "تاج <button>", sample_output: "<button>Click Me</button>", difficulty: "beginner" }
        ]
    };

    let currentLanguage = 'python';
    let currentChallengeId = 1;
    let editor;

    window.onload = function() {
        // تهيئة المحرر الافتراضي (Python)
        editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
            mode: "python", theme: "dracula", lineNumbers: true, indentUnit: 4, matchBrackets: true
        });
        
        loadLanguageEnvironment('python');
    };

    // 2. دالة التبديل بين اللغات (السر كله هنا)
    function switchLanguage(lang) {
        currentLanguage = lang;
        
        // تحديث شكل الأزرار (التبويبات)
        document.getElementById('tab-python').classList.remove('active');
        document.getElementById('tab-web').classList.remove('active');
        document.getElementById(`tab-${lang}`).classList.add('active');

        loadLanguageEnvironment(lang);
    }

    // 3. تهيئة بيئة اللغة المختارة
    function loadLanguageEnvironment(lang) {
        const challenges = allChallenges[lang];
        currentChallengeId = challenges[0].id; // أول تحدي في اللغة
        
        // تغيير عنوان القائمة الجانبية وعنوان المحرر والمود
        if (lang === 'python') {
            document.getElementById('sidebar-title').innerText = "📋 تحديات Python";
            document.getElementById('editor-title').innerHTML = '<i class="fa-brands fa-python" style="color:#fbbf24;"></i> محرر بايثون';
            editor.setOption("mode", "python");
            document.getElementById('html-preview').style.display = 'none'; // إخفاء المعاينة
        } else if (lang === 'web') {
            document.getElementById('sidebar-title').innerText = "📋 تحديات HTML/CSS";
            document.getElementById('editor-title').innerHTML = '<i class="fa-brands fa-html5" style="color:#e34f26;"></i> محرر الويب';
            editor.setOption("mode", "htmlmixed"); // يدعم HTML و CSS مع بعض
            document.getElementById('html-preview').style.display = 'block'; // إظهار المعاينة
        }

        renderSidebar();
        loadChallenge(currentChallengeId);
    }

    // 4. رسم قائمة التحديات حسب اللغة الحالية
    function renderSidebar() {
        const listDiv = document.getElementById('challenges-list');
        listDiv.innerHTML = '';
        const challenges = allChallenges[currentLanguage];

        challenges.forEach(challenge => {
            const diffClass = challenge.difficulty === 'beginner' ? 'diff-beginner' : 'diff-intermediate';
            const diffText = challenge.difficulty === 'beginner' ? 'مبتدئ' : 'متوسط';
            
            listDiv.innerHTML += `
                <div class="challenge-item ${challenge.id === currentChallengeId ? 'active' : ''}" onclick="loadChallenge(${challenge.id})">
                    <div class="challenge-title">${challenge.title}</div>
                    <span class="difficulty ${diffClass}">${diffText}</span>
                </div>
            `;
        });
    }

    // 5. تحميل التحدي المختار
    function loadChallenge(id) {
        currentChallengeId = id;
        const challenges = allChallenges[currentLanguage];
        const challenge = challenges.find(c => c.id === id);
        
        document.getElementById('current-title').innerText = challenge.title;
        document.getElementById('current-desc').innerText = challenge.description;
        document.getElementById('current-input').innerText = challenge.sample_input;
        document.getElementById('current-output').innerText = challenge.sample_output;
        
        // مسح المحرر والنتائج
        if (currentLanguage === 'python') {
            editor.setValue("# اكتب كود بايثون هنا\n");
        } else {
            editor.setValue("<!-- اكتب كود HTML/CSS هنا -->\n");
        }
        
        document.getElementById('output-box').innerHTML = '<span style="color: #666;">اضغط على "تشغيل الكود" لرؤية النتيجة هنا...</span>';
        
        // تصفير المعاينة لو إحنا في الويب
        if(currentLanguage === 'web'){
            document.getElementById('html-preview').srcdoc = "";
        }

        renderSidebar(); 
    }

    // 6. تشغيل وفحص الكود (منفصل حسب اللغة)
    function checkCode() {
        const code = editor.getValue().trim();
        const outputBox = document.getElementById('output-box');
        const iframe = document.getElementById('html-preview');
        const challenges = allChallenges[currentLanguage];
        const challenge = challenges.find(c => c.id === currentChallengeId);
        
        if(code === "" || code.startsWith("#") || code.startsWith("<!--")) {
            outputBox.innerHTML = `<div class="wrong">❌ يرجى كتابة الحل أولاً.</div>`;
            return;
        }

        outputBox.innerHTML = `<div class="info-msg">⏳ جاري التحليل...</div>`;
        const codeLower = code.toLowerCase();

        setTimeout(() => {
            if (currentLanguage === 'python') {
                // فحص كود بايثون
                const targetOutput = challenge.sample_output;
                const hasPrint = code.includes("print");
                const hasTarget = code.includes(targetOutput);

                let resultHTML = `<div class="info-msg">> python code.py</div><br>`;
                
                if (hasPrint && hasTarget) {
                    resultHTML += `<div style="color:#fff;">${targetOutput}</div>`;
                    resultHTML += `<br><div class="correct">✅ إجابة صحيحة (Test Passed)!</div>`;
                } else {
                    resultHTML += `<div class="wrong">❌ خطأ: تأكد من استخدام دالة print والمخرجات المطلوبة "${targetOutput}"</div>`;
                }
                outputBox.innerHTML = resultHTML;

            } else if (currentLanguage === 'web') {
                // فحص وتشغيل كود HTML/CSS
                iframe.srcdoc = code; // عرض الكود المكتوب مباشرة في الإطار للمعاينة
                
                let resultHTML = `<div class="info-msg">> عرض النتيجة الحية بالأسفل 👇</div><br>`;
                
                // فحص ذكي للتاجز
                let isCorrect = false;
                if (challenge.id === 101 && codeLower.includes("<h1") && codeLower.includes("pad platform")) {
                    isCorrect = true;
                } else if (challenge.id === 102 && codeLower.includes("<p") && codeLower.includes("red") && codeLower.includes("hello")) {
                    isCorrect = true;
                } else if (challenge.id === 103 && codeLower.includes("<button") && codeLower.includes("click me")) {
                    isCorrect = true;
                }

                if (isCorrect) {
                    resultHTML += `<div class="correct">✅ كود سليم! تم تطبيق التصميم بنجاح.</div>`;
                } else {
                    resultHTML += `<div class="wrong">❌ الكود غير مطابق للمطلوب. راجع الشروط.</div>`;
                }
                outputBox.innerHTML = resultHTML;
            }
        }, 500);
    }
</script>
</body>
</html>
